name: Weekly Science & Tech Digest
permissions:
  contents: write
on:
  # Tuesday 11pm CST = Wednesday 05:00 UTC
  schedule:
    - cron: "0 5 * * 3" # Runs at 05:00, only on Wednesday

  # Manual trigger from GitHub UI (useful for testing)
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python -m src.main

      - name: Log run and commit
        run: |
          echo "Last run: $(date -u)" > .last_run
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_run
          git diff --staged --quiet || git commit -m "chore: update last run timestamp"
          git push
